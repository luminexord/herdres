name: release

# Cut a release when a v* tag is pushed. The pipeline is a hard gate -> a sanity
# check that the tag matches the code's HERDRES_VERSION -> build the install-set
# assets -> publish a GitHub release with both assets and auto-generated notes.
# The asset names (herdres-<tag>.tar.gz + .sha256) are the Phase-3 release contract
# the `herdres update --channel stable` fetcher relies on.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pytest
        run: pip install pytest

      # Hard gate: the release tests must pass before anything is built or shipped.
      - name: Run release + update tests (required gate)
        run: python -m pytest tests/test_update.py tests/test_release_build.py tests/test_skill_herdres.py -q

      # The git tag and the code's HERDRES_VERSION must agree, so a stable release
      # can never advertise a version the binary does not report. "v0.2.0" must
      # match HERDRES_VERSION = "0.2.0".
      - name: Verify tag == HERDRES_VERSION
        run: |
          set -eu
          tag="${GITHUB_REF_NAME}"
          code_version="$(python -c 'import re,pathlib; t=pathlib.Path("herdres.py").read_text(); m=re.search(r"^HERDRES_VERSION\s*=\s*[\"\x27]([^\"\x27]+)[\"\x27]", t, re.M); print(m.group(1) if m else "")')"
          if [ -z "$code_version" ]; then
            echo "could not parse HERDRES_VERSION from herdres.py" >&2
            exit 1
          fi
          if [ "$tag" != "v$code_version" ]; then
            echo "tag $tag does not match HERDRES_VERSION $code_version (expected v$code_version)" >&2
            exit 1
          fi
          echo "tag $tag matches HERDRES_VERSION $code_version"

      - name: Build release assets
        run: |
          set -eu
          chmod +x scripts/build_release.sh
          scripts/build_release.sh "${GITHUB_REF_NAME}" dist

      # Publish with both assets and GitHub's auto-generated notes. --generate-notes
      # fills the body from merged PRs / commits since the previous tag.
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -eu
          tag="${GITHUB_REF_NAME}"
          gh release create "$tag" \
            "dist/herdres-$tag.tar.gz" \
            "dist/herdres-$tag.sha256" \
            --title "$tag" \
            --generate-notes
