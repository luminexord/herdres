name: skill

on:
  pull_request:
    paths:
      - "skills/**"
      - "SKILL.md"
      - "tests/test_skill_herdres.py"
      - ".github/workflows/skill.yml"
  push:
    branches: [main]
    paths:
      - "skills/**"
      - "SKILL.md"
      - "tests/test_skill_herdres.py"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pytest
        run: pip install pytest

      - name: Run skill accuracy + spec tests (required gate)
        run: python -m pytest tests/test_skill_herdres.py -v

      # Best-effort: the official agentskills.io validator. Never fails the job —
      # the pytest spec checks above are the hard gate; this is extra signal.
      - name: skills-ref validate (best-effort)
        continue-on-error: true
        run: |
          npx --yes skills-ref validate ./skills/herdres \
            || pipx run skills-ref validate ./skills/herdres \
            || echo "skills-ref validator unavailable; relying on the pytest spec checks"
